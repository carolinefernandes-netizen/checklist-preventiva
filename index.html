<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Preventiva — Belcito</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="CheckList">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #3B6D11; --green-bg: #EAF3DE; --green-border: #639922;
    --amber: #854F0B; --amber-bg: #FAEEDA; --amber-border: #BA7517;
    --red: #A32D2D; --red-bg: #FCEBEB; --red-border: #E24B4A;
    --blue: #185FA5; --blue-bg: #E6F1FB; --blue-border: #378ADD;
    --gray: #444441; --gray-light: #F1EFE8; --gray-border: #B4B2A9;
    --text: #2C2C2A; --text-muted: #888780; --text-light: #5F5E5A;
    --surface: #fff; --surface-1: #F9F8F5; --surface-2: #F1EFE8;
    --border: #D3D1C7; --radius: 10px;
    --font: -apple-system, 'Segoe UI', Arial, sans-serif;
    --belcito-red: #CC0000; --belcito-orange: #FF9900;
  }

  body {
    font-family: var(--font);
    background: var(--surface-1);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 2rem;
  }

  /* HEADER */
  .page-header {
    background: #1a1a18;
    color: #fff;
    padding: 0.85rem 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .page-header .logo-belcito, .page-header .logo-cliente { flex-shrink: 0; }
  .page-header img { height: 45px; max-width: 98px; object-fit: contain; }
  .page-header .header-text { text-align: center; flex: 1; min-width: 0; padding: 0 6px; }
  .page-header h1 { font-size: 14px; font-weight: 600; line-height: 1.2; }
  .page-header p { font-size: 11px; color: #aaa; margin-top: 2px; }

  /* BODY */
  .container { max-width: 600px; margin: 0 auto; padding: 1rem; }

  /* UNIT SELECTOR */
  .unit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1rem;
  }
  .unit-card label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 5px;
  }
  .unit-card select {
    width: 100%;
    padding: 10px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: var(--font);
    color: var(--text);
    background: var(--surface-1);
    -webkit-appearance: none;
  }

  /* META FIELDS */
  .meta-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1rem;
  }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 5px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: var(--font);
    color: var(--text);
    background: var(--surface-1);
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--blue-border);
    box-shadow: 0 0 0 3px rgba(55,138,221,0.15);
  }

  /* SECTION TITLE */
  .section-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 1.25rem 0 0.6rem;
  }

  /* DOCA CARD */
  .doca-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 0.75rem;
    overflow: hidden;
  }
  .doca-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface-1);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .doca-card-header:active { background: var(--surface-2); }
  .doca-info { display: flex; align-items: center; gap: 10px; }
  .doca-badge {
    width: 36px; height: 36px;
    background: var(--surface-2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    color: var(--text-light);
    flex-shrink: 0;
  }
  .doca-title { font-size: 14px; font-weight: 600; }
  .doca-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .doca-status-pills { display: flex; gap: 4px; flex-wrap: wrap; }
  .pill {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 7px;
    border-radius: 20px;
    line-height: 1;
  }
  .pill-ok { background: var(--green-bg); color: var(--green); }
  .pill-ressalva { background: var(--amber-bg); color: var(--amber); }
  .pill-naook { background: var(--red-bg); color: var(--red); }
  .pill-naoapl { background: var(--blue-bg); color: var(--blue); }
  .pill-vazio { background: var(--gray-light); color: var(--text-muted); }
  .chevron {
    font-size: 18px;
    color: var(--text-muted);
    transition: transform 0.2s;
    flex-shrink: 0;
    margin-left: 6px;
  }
  .chevron.open { transform: rotate(180deg); }

  .doca-body { padding: 0.85rem 1rem; display: none; }
  .doca-body.open { display: block; }

  /* STATUS BLOCK */
  .status-block { margin-bottom: 0.85rem; }
  .status-block:last-child { margin-bottom: 0; }
  .status-block-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 6px;
  }
  .status-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .sbtn {
    padding: 9px 8px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface-1);
    color: var(--text-muted);
    font-size: 12px;
    font-family: var(--font);
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.12s;
    line-height: 1.3;
    -webkit-appearance: none;
  }
  .sbtn:active { transform: scale(0.97); }
  .sbtn.active-ok { border-color: var(--green-border); background: var(--green-bg); color: var(--green); }
  .sbtn.active-ressalva { border-color: var(--amber-border); background: var(--amber-bg); color: var(--amber); }
  .sbtn.active-naook { border-color: var(--red-border); background: var(--red-bg); color: var(--red); }
  .sbtn.active-naoapl { border-color: var(--blue-border); background: var(--blue-bg); color: var(--blue); }
  .na-locked {
    padding: 9px 8px;
    border-radius: 8px;
    border: 1.5px dashed var(--blue-border);
    background: var(--blue-bg);
    color: var(--blue);
    font-size: 12px;
    font-weight: 600;
    text-align: center;
  }

  .obs-area { margin-top: 6px; }
  .obs-area textarea {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--text);
    background: var(--surface-1);
    resize: none;
    min-height: 58px;
  }
  .obs-area textarea:focus {
    outline: none;
    border-color: var(--amber-border);
    box-shadow: 0 0 0 3px rgba(186,117,23,0.12);
  }

  .divider { height: 1px; background: var(--border); margin: 0.75rem 0; }

  /* SUMMARY */
  .summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    margin-top: 1rem;
  }
  .summary h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 0.75rem;
  }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .scard { border-radius: 8px; padding: 0.65rem 0.75rem; }
  .scard .num { font-size: 26px; font-weight: 700; line-height: 1; }
  .scard .lbl { font-size: 11px; margin-top: 3px; font-weight: 500; }
  .scard-ok { background: var(--green-bg); }
  .scard-ok .num, .scard-ok .lbl { color: var(--green); }
  .scard-res { background: var(--amber-bg); }
  .scard-res .num, .scard-res .lbl { color: var(--amber); }
  .scard-nok { background: var(--red-bg); }
  .scard-nok .num, .scard-nok .lbl { color: var(--red); }
  .scard-na { background: var(--blue-bg); }
  .scard-na .num, .scard-na .lbl { color: var(--blue); }

  /* PROGRESS */
  .progress-bar-wrap { margin-top: 0.75rem; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
  .progress-bar { height: 6px; background: var(--surface-2); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green-border); border-radius: 10px; transition: width 0.3s; }

  /* CORRETIVAS */
  .corretiva-item {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 0.8rem;
    margin-bottom: 0.6rem;
    background: var(--amber-bg);
  }
  .corretiva-item:last-child { margin-bottom: 0; }
  .corretiva-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
  .corretiva-doca { font-size: 13px; font-weight: 700; color: var(--amber); }
  .corretiva-equip { font-size: 11px; color: var(--text-muted); }
  .corretiva-text { font-size: 13px; color: var(--text); line-height: 1.4; margin-bottom: 8px; }
  .corretiva-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .corretiva-grid .cfield label { display:block; font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; margin-bottom: 3px; }
  .corretiva-grid .cfield input {
    width: 100%; padding: 7px 9px; border: 1px solid var(--border); border-radius: 7px;
    font-size: 12px; font-family: var(--font); background: var(--surface);
  }
  .empty-corretivas { font-size: 13px; color: var(--text-muted); text-align: center; padding: 1rem 0; }

  /* ACTIONS */
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 1rem; }
  .btn {
    padding: 13px 10px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-size: 14px;
    font-family: var(--font);
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    text-align: center;
    -webkit-appearance: none;
    transition: all 0.12s;
  }
  .btn:active { transform: scale(0.98); background: var(--surface-2); }
  .btn-primary { background: #1a1a18; color: #fff; border-color: transparent; }
  .btn-primary:active { background: #333; }
  .btn:disabled { opacity: 0.5; }

  /* ADD DOCA */
  .add-doca-btn {
    width: 100%;
    padding: 12px;
    border: 1.5px dashed var(--gray-border);
    border-radius: 12px;
    background: transparent;
    color: var(--text-muted);
    font-size: 14px;
    font-family: var(--font);
    cursor: pointer;
    margin-top: 0.25rem;
    -webkit-appearance: none;
  }
  .add-doca-btn:active { background: var(--surface-2); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    padding: 1.25rem 1rem 2rem;
    width: 100%;
    max-width: 600px;
  }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
  .modal .field { margin-bottom: 10px; }
  .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 1rem; }
  .modal label.checkbox { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; color: var(--text); margin-top: 8px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: #1a1a18; color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>

  <div class="header-text">
    <h1 id="header-title">Checklist Preventiva</h1>
    <p id="header-subtitle">Selecione a unidade</p>
    <span id="sync-status" style="font-size:10px;color:#888;display:block;margin-top:2px;"></span>
  </div>
  <img class="logo-cliente" id="client-logo" src="" alt="Cliente" />
</div>

<div class="container">

  <div class="unit-card">
    <label>Unidade</label>
    <select id="unit-select" onchange="onUnitChange()"></select>
  </div>

  <div class="meta-card">
    <div class="meta-grid">
      <div class="field">
        <label>Data</label>
        <input type="date" id="data-global" />
      </div>
      <div class="field">
        <label>Responsável</label>
        <input type="text" id="resp-global" placeholder="Nome do técnico" />
      </div>
    </div>
    <div class="field" style="margin-top:10px;">
      <label>Observação Geral da Visita</label>
      <textarea id="obs-geral" placeholder="Anotações gerais da visita..." style="width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:var(--font);background:var(--surface-1);resize:none;min-height:58px;"></textarea>
    </div>
  </div>

  <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;">
    <span>Docas</span>
    <span id="docas-progress" style="font-weight:400;color:var(--text-muted);font-size:11px;letter-spacing:0;text-transform:none;"></span>
  </div>
  <div id="docas-container"></div>
  <button class="add-doca-btn" onclick="openAddModal()">+ Adicionar doca</button>

  <div class="summary">
    <h3>Resumo geral</h3>
    <div class="summary-grid">
      <div class="scard scard-ok"><div class="num" id="s-ok">0</div><div class="lbl">Preventiva Ok</div></div>
      <div class="scard scard-res"><div class="num" id="s-res">0</div><div class="lbl">Com Ressalvas</div></div>
      <div class="scard scard-nok"><div class="num" id="s-nok">0</div><div class="lbl">Não Ok</div></div>
      <div class="scard scard-na"><div class="num" id="s-na">0</div><div class="lbl">Não se Aplica</div></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-label"><span>Preenchimento</span><span id="progress-pct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="summary" style="margin-top:0.75rem;">
    <h3>Corretivas abertas</h3>
    <div id="corretivas-list"><p class="empty-corretivas">Nenhuma corretiva registrada</p></div>
  </div>

  <div class="actions">
    <button class="btn" onclick="exportCSV()">⬇ Exportar TXT</button>
    <button class="btn btn-primary" onclick="exportXLSX()">📊 Exportar XLSX</button>
  </div>

</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>Adicionar doca</h3>
    <div class="field">
      <label>Número da doca</label>
      <input type="text" id="modal-num" placeholder="Ex: 17" />
    </div>
    <div class="field">
      <label>Modelo</label>
      <input type="text" id="modal-modelo" placeholder="Ex: Porta Manual/Niveladora Eletro Hid." />
    </div>
    <label class="checkbox"><input type="checkbox" id="modal-niv" checked /> Possui niveladora</label>
    <div class="modal-btns">
      <button class="btn" onclick="closeAddModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmAddDoca()">Adicionar</button>
    </div>
  </div>
</div>

function range(a, b) { const r = []; for (let i = a; i <= b; i++) r.push(i); return r; }

function buildSimoesFilho() {
  const docas = [{ num: '17 S/N', modelo: 'Porta Manual / Rampa', niv: false }];
  range(18, 36).forEach(n => docas.push({ num: String(n), modelo: 'Porta Manual/Niveladora Eletro Hid. (Marksell)', niv: true }));
  range(50, 87).forEach(n => docas.push({ num: String(n), modelo: 'Porta Manual/Niveladora Eletro Hid. (Marksell)', niv: true }));
  docas.push({ num: '88', modelo: 'Porta Manual', niv: false });
  return docas;
}

function buildHidrolandia() {
  const soPorta = [19, 20, 34, 35];
  const docas = [];
  range(1, 66).forEach(n => {
    docas.push({ num: String(n), modelo: soPorta.includes(n) ? 'Só Porta' : 'Porta e Niv Elet/hid', niv: !soPorta.includes(n) });
  });
  docas.push({ num: '67', modelo: 'Portão Grande (sala manutenção)', niv: false });
  docas.push({ num: '68', modelo: 'Portão Grande e Rampa', niv: false });
  docas.push({ num: '69', modelo: 'Porta Vermelha e Rampa', niv: false });
  return docas;
}

  ressalva:{ label: 'Com Ressalvas', cls: 'active-ressalva',  pill: 'pill-ressalva',desc: 'Equipamento funcionando, porém com observação a ser corrigida.' },
  naook:   { label: 'Não Ok',        cls: 'active-naook',     pill: 'pill-naook',   desc: 'Equipamento com falha. Deve-se informar o motivo.' },
  naoapl:  { label: 'Não se Aplica', cls: 'active-naoapl',    pill: 'pill-naoapl',  desc: 'Item não existente nesta doca.' },
};

let currentUnitKey = 'shopee_simoes_filho';
let state = [];
let nextId = 1;

// ── FIREBASE ──────────────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyDRucfu_EmrsAUQJ9pNLUMmEc1HOsinYI8",
  authDomain: "checklist-de-preventiva.firebaseapp.com",
  projectId: "checklist-de-preventiva",
  storageBucket: "checklist-de-preventiva.firebasestorage.app",
  messagingSenderId: "488059283386",
  appId: "1:488059283386:web:e27e1a28dc8c11fd9a5f83"
});
const db = firebase.firestore();
let unsubSnapshot = null;
let saveTimer = null;
let fbReady = false;
let justSaved = false;

// ── HELPERS DE MÊS ───────────────────────────────────────────────────────────
function monthKey(offset = 0) {
  const d = new Date();
  d.setDate(1); d.setMonth(d.getMonth() + offset);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function buildFreshState(key, carryOver = []) {
  const u = UNITS[key];
  return u.docas.map(d => {
    const prev = carryOver.find(c => c.num === d.num);
    const openP = prev && !prev.portaoAtend && (prev.portao === 'ressalva' || prev.portao === 'naook');
    const openN = prev && !prev.nivelAtend  && (prev.nivel  === 'ressalva' || prev.nivel  === 'naook');
    return {
      id: nextId++, num: d.num, modelo: d.modelo, temNiveladora: d.niv,
      portao: openP ? prev.portao : '', portaoObs: openP ? (prev.portaoObs||'') : '',
      portaoAtend: '', portaoMotivo: '',
      nivel: d.niv ? (openN ? prev.nivel : '') : 'naoapl',
      nivelObs: openN ? (prev.nivelObs||'') : '', nivelAtend: '', nivelMotivo: '',
      data: '', resp: '', dataManual: false, respManual: false, open: false,
    };
  });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  const sel = document.getElementById('unit-select');
  Object.keys(UNITS).forEach(key => {
    const u = UNITS[key];
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = u.cliente + ' — ' + u.unidade;
    sel.appendChild(opt);
  });
  sel.value = currentUnitKey;

  document.getElementById('data-global').addEventListener('change', function() {
    const val = this.value;
    state.forEach(d => { if (!d.dataManual) d.data = val; });
    scheduleSave();
  });
  document.getElementById('resp-global').addEventListener('input', function() {
    const val = this.value;
    state.forEach(d => { if (!d.respManual) d.resp = val; });
    scheduleSave();
  });
  document.getElementById('obs-geral').addEventListener('input', scheduleSave);

  setSyncStatus('Conectando...');
  firebase.auth().signInAnonymously()
    .then(() => { fbReady = true; loadUnit(currentUnitKey); })
    .catch(e => { console.error('Auth error:', e); setSyncStatus('Erro de conexão'); });
}

function onUnitChange() {
  currentUnitKey = document.getElementById('unit-select').value;
  loadUnit(currentUnitKey);
}

function loadUnit(key) {
  const u = UNITS[key];
  document.getElementById('header-title').textContent = u.cliente + ' — ' + u.unidade;
  document.getElementById('client-logo').src = LOGOS[u.logo];
  document.getElementById('docas-container').innerHTML =
    '<p style="text-align:center;color:var(--text-muted);padding:2rem;">Carregando...</p>';
  setSyncStatus('Carregando...');

  clearTimeout(saveTimer); // Cancela save pendente de outra unidade
  if (unsubSnapshot) { unsubSnapshot(); unsubSnapshot = null; }

  const mes = monthKey();
  const docRef = db.collection('checklists').doc(key + '_' + mes);

  docRef.get().then(snap => {
    // Se documento existe e tem docas, usa ele. Senão, recria (corrige dados corrompidos)
    if (snap.exists && (snap.data().docas || []).length > 0) { startSnapshot(docRef); return; }
    return db.collection('checklists').doc(key + '_' + monthKey(-1)).get().then(prevSnap => {
      nextId = 1;
      return docRef.set({
        unitKey: key, mes,
        dataGlobal: '', respGlobal: '',
        docas: buildFreshState(key, prevSnap.exists ? prevSnap.data().docas : []),
      }).then(() => startSnapshot(docRef));
    });
  }).catch(e => { console.error('loadUnit error:', e); setSyncStatus('Erro'); });
}

// ── FIRESTORE SYNC ────────────────────────────────────────────────────────────
function startSnapshot(docRef) {
  unsubSnapshot = docRef.onSnapshot(snap => {
    if (!snap.exists || snap.metadata.hasPendingWrites) return;
    // Snapshot do nosso próprio save: não re-renderiza (evita fechar pickers e sobrescrever estado local)
    if (justSaved) { justSaved = false; setSyncStatus('✓ Salvo'); return; }
    const data = snap.data();
    document.getElementById('data-global').value = data.dataGlobal || '';
    document.getElementById('resp-global').value = data.respGlobal || '';
    document.getElementById('obs-geral').value = data.obsGeral || '';
    const openIds = new Set(state.filter(d => d.open).map(d => d.id));
    state = (data.docas || []).map(d => ({ ...d, open: openIds.has(d.id) }));
    nextId = state.length ? Math.max(...state.map(d => d.id)) + 1 : 1;
    renderAll();
    setSyncStatus('✓ Salvo');
  }, e => { console.error('Snapshot error:', e); setSyncStatus('Erro'); });
}

function scheduleSave() {
  clearTimeout(saveTimer);
  setSyncStatus('Salvando...');
  saveTimer = setTimeout(saveToFirestore, 600);
}

function saveToFirestore() {
  if (!fbReady || !state.length) return;
  justSaved = true;
  const mes = monthKey();
  db.collection('checklists').doc(currentUnitKey + '_' + mes).update({
    dataGlobal: document.getElementById('data-global').value,
    respGlobal: document.getElementById('resp-global').value,
    obsGeral: document.getElementById('obs-geral').value,
    docas: state,
  }).then(() => setSyncStatus('✓ Salvo'))
    .catch(e => { console.error('save error:', e); setSyncStatus('Erro ao salvar'); });
}

function setSyncStatus(msg) { document.getElementById('sync-status').textContent = msg; }

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll() {
  const container = document.getElementById('docas-container');
  container.innerHTML = '';
  state.forEach(d => container.appendChild(buildCard(d)));
  updateSummary();
}

function buildCard(d) {
  const wrap = document.createElement('div');
  wrap.className = 'doca-card';
  wrap.id = 'card-' + d.id;

  const pLabel = d.portao ? STATUS_INFO[d.portao].label : '—';
  const nLabel = d.nivel  ? STATUS_INFO[d.nivel].label  : '—';
  const pPill  = d.portao ? STATUS_INFO[d.portao].pill  : 'pill-vazio';
  const nPill  = d.nivel  ? STATUS_INFO[d.nivel].pill   : 'pill-vazio';

  wrap.innerHTML = `
    <div class="doca-card-header" onclick="toggleCard(${d.id})">
      <div class="doca-info">
        <div class="doca-badge">${d.num}</div>
        <div>
          <div class="doca-title">Doca ${d.num}</div>
          <div class="doca-subtitle">${d.modelo}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div class="doca-status-pills">
          <span class="pill ${pPill}">P: ${pLabel}</span>
          <span class="pill ${nPill}">N: ${nLabel}</span>
        </div>
        <span class="chevron ${d.open ? 'open' : ''}">&#8964;</span>
      </div>
    </div>
    <div class="doca-body ${d.open ? 'open' : ''}">
      ${buildStatusBlock(d, 'portao', 'Portão', true)}
      <div class="divider"></div>
      ${buildStatusBlock(d, 'nivel', 'Niveladora', d.temNiveladora)}
      <div class="divider" style="margin-top:10px;"></div>
      <div class="meta-grid" style="gap:6px;margin-top:6px;">
        <div class="field">
          <label>Data (esta doca)</label>
          <input type="date" value="${d.data||''}" onchange="setDocaField(${d.id},'data',this.value,'dataManual')" />
        </div>
        <div class="field">
          <label>Responsável</label>
          <input type="text" value="${d.resp||''}" placeholder="Idem global" onblur="setDocaField(${d.id},'resp',this.value,'respManual')" />
        </div>
      </div>
      <div style="margin-top:8px;text-align:right;">
        <button onclick="removeDoca(${d.id})" style="background:none;border:none;color:#A32D2D;font-size:12px;cursor:pointer;font-family:var(--font);">✕ Remover doca</button>
      </div>
    </div>
  `;
  return wrap;
}

function buildStatusBlock(d, campo, label, habilitado) {
  if (!habilitado) {
    return `
      <div class="status-block">
        <div class="status-block-label">${label}</div>
        <div class="na-locked">Não se Aplica — esta doca não possui ${label.toLowerCase()}</div>
      </div>
    `;
  }
  const campoObs = campo + 'Obs';
  const keys = ['ok','ressalva','naook','naoapl'];
  const btns = keys.map(k => {
    const active = d[campo] === k ? STATUS_INFO[k].cls : '';
    return `<button class="sbtn ${active}" onclick="setStatus(${d.id},'${campo}','${k}')">${STATUS_INFO[k].label}</button>`;
  }).join('');
  const showObs = d[campo] === 'ressalva' || d[campo] === 'naook';
  return `
    <div class="status-block">
      <div class="status-block-label">${label}</div>
      <div class="status-btns">${btns}</div>
      ${showObs ? `<div class="obs-area"><textarea placeholder="Descreva o problema..." onblur="setObs(${d.id},'${campoObs}',this.value)">${d[campoObs]||''}</textarea></div>` : ''}
    </div>
  `;
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
function toggleCard(id) {
  const d = state.find(x => x.id === id);
  if (d) { d.open = !d.open; renderAll(); }
}

function setStatus(id, campo, val) {
  const d = state.find(x => x.id === id);
  if (!d) return;
  if (d[campo] === val) { d[campo] = ''; d[campo + 'Obs'] = ''; }
  else { d[campo] = val; }
  renderAll();
  scheduleSave();
}

function setObs(id, campo, val) {
  const d = state.find(x => x.id === id);
  if (d) { d[campo] = val; scheduleSave(); }
}

function setCorretivaField(id, campo, val) {
  const d = state.find(x => x.id === id);
  if (d) { d[campo] = val; scheduleSave(); updateCorretivas(); }
}

function setDocaField(id, campo, val, manualFlag) {
  const d = state.find(x => x.id === id);
  if (!d) return;
  d[campo] = val;
  d[manualFlag] = true;
  scheduleSave();
}

function removeDoca(id) {
  if (!confirm('Remover esta doca?')) return;
  state = state.filter(x => x.id !== id);
  renderAll();
  scheduleSave();
}

// ── ADD MODAL ─────────────────────────────────────────────────────────────────
function openAddModal() { document.getElementById('add-modal').classList.add('open'); }
function closeAddModal() { document.getElementById('add-modal').classList.remove('open'); }
function confirmAddDoca() {
  const num = document.getElementById('modal-num').value.trim();
  const modelo = document.getElementById('modal-modelo').value.trim() || 'Não informado';
  const temNiveladora = document.getElementById('modal-niv').checked;
  if (!num) { alert('Informe o número da doca'); return; }
  const dataGlobal = document.getElementById('data-global').value;
  const respGlobal = document.getElementById('resp-global').value;
  state.push({
    id: nextId++, num, modelo, temNiveladora,
    portao: '', portaoObs: '', portaoAtend: '', portaoMotivo: '',
    nivel: temNiveladora ? '' : 'naoapl', nivelObs: '', nivelAtend: '', nivelMotivo: '',
    data: dataGlobal, resp: respGlobal, dataManual: false, respManual: false,
    open: true,
  });
  closeAddModal();
  document.getElementById('modal-num').value = '';
  document.getElementById('modal-modelo').value = '';
  document.getElementById('modal-niv').checked = true;
  renderAll();
  scheduleSave();
  showToast('Doca ' + num + ' adicionada');
}

// ── SUMMARY ───────────────────────────────────────────────────────────────────
function updateSummary() {
  let ok=0, res=0, nok=0, na=0, total=0, filled=0;
  state.forEach(d => {
    [d.portao, d.nivel].forEach(val => {
      total++;
      if (val) filled++;
      if (val==='ok') ok++;
      else if (val==='ressalva') res++;
      else if (val==='naook') nok++;
      else if (val==='naoapl') na++;
    });
  });
  document.getElementById('s-ok').textContent  = ok;
  document.getElementById('s-res').textContent = res;
  document.getElementById('s-nok').textContent = nok;
  document.getElementById('s-na').textContent  = na;
  const pct = total ? Math.round(filled/total*100) : 0;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('header-subtitle').textContent = state.length + ' docas · ' + pct + '% preenchido';
  document.getElementById('docas-progress').textContent = filled + '/' + total + ' preenchidos';
  updateCorretivas();
}

function updateCorretivas() {
  const list = document.getElementById('corretivas-list');
  const items = [];
  state.forEach(d => {
    if ((d.portao === 'ressalva' || d.portao === 'naook') && !(d.portaoAtend && d.portaoMotivo))
      items.push({ id: d.id, doca: d.num, equip: 'Portão', obs: d.portaoObs || '—', atendField: 'portaoAtend', motivoField: 'portaoMotivo', atend: d.portaoAtend, motivo: d.portaoMotivo });
    if ((d.nivel === 'ressalva' || d.nivel === 'naook') && !(d.nivelAtend && d.nivelMotivo))
      items.push({ id: d.id, doca: d.num, equip: 'Niveladora', obs: d.nivelObs || '—', atendField: 'nivelAtend', motivoField: 'nivelMotivo', atend: d.nivelAtend, motivo: d.nivelMotivo });
  });
  if (!items.length) {
    list.innerHTML = '<p class="empty-corretivas">Nenhuma corretiva registrada</p>';
    return;
  }
  list.innerHTML = items.map(it => `
    <div class="corretiva-item">
      <div class="corretiva-head">
        <span class="corretiva-doca">Doca ${it.doca}</span>
        <span class="corretiva-equip">${it.equip}</span>
      </div>
      <div class="corretiva-text">${it.obs}</div>
      <div class="corretiva-grid">
        <div class="cfield">
          <label>Data Atendimento</label>
          <input type="date" value="${it.atend||''}" onchange="setCorretivaField(${it.id},'${it.atendField}',this.value)" />
        </div>
        <div class="cfield">
          <label>Motivo</label>
          <input type="text" placeholder="Motivo" value="${it.motivo||''}" onchange="setCorretivaField(${it.id},'${it.motivoField}',this.value)" />
        </div>
      </div>
    </div>
  `).join('');
}

// ── EXPORT TXT (rápido) ───────────────────────────────────────────────────────
function exportCSV() {
  const u = UNITS[currentUnitKey];
  const data = document.getElementById('data-global').value || '';
  const resp = document.getElementById('resp-global').value || '';
  const SL = { ok:'Preventiva Ok', ressalva:'Com Ressalvas', naook:'Não Ok', naoapl:'Não se Aplica', '':'Não preenchido' };
  let csv = 'Cliente;Unidade;Nº Doca;Modelo;Data;Responsável;Portão;Obs Portão;Niveladora;Obs Niveladora\n';
  state.forEach(d => {
    const docaData = d.data || data;
    const docaResp = d.resp || resp;
    const dataFmt = docaData ? docaData.split('-').reverse().join('/') : '';
    csv += [u.cliente, u.unidade, d.num, d.modelo, dataFmt, docaResp,
      SL[d.portao]||'', d.portaoObs||'', SL[d.nivel]||'', d.nivelObs||''
    ].join(';') + '\n';
  });
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const dt   = data.replace(/-/g,'') || 'semdata';
  a.href = url; a.download = 'preventiva_' + currentUnitKey + '_' + dt + '.csv'; a.click();
  showToast('TXT/CSV exportado!');
}

// ── EXPORT XLSX (formato Belcito) ─────────────────────────────────────────────
async function exportXLSX() {
  const u = UNITS[currentUnitKey];
  const data = document.getElementById('data-global').value || '';
  const resp = document.getElementById('resp-global').value || '';
  const obsGeral = document.getElementById('obs-geral').value || '';
  const dataFmt = data ? data.split('-').reverse().join('/') : '';
  const SL = { ok:'Preventiva Ok', ressalva:'Com Ressalvas', naook:'Não Ok', naoapl:'Não se Aplica', '':'Não preenchido' };

  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet('Preventiva');

  // Linha de logos (row 1)
  ws.getRow(1).height = 55;
  for (let c = 1; c <= 8; c++) {
    const cell = ws.getCell(1, c);
    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1A1A18' } };
  }
  const belcitoImgId = wb.addImage({ base64: LOGOS.belcito, extension: 'png' });
  const clienteImgId = wb.addImage({ base64: LOGOS[u.logo], extension: 'png' });
  ws.addImage(belcitoImgId, { tl: { col: 0, row: 0 }, ext: { width: 230, height: 45 } });

  // Linhas 2-5: cliente (logo)/unidade/legenda
  ws.mergeCells('A2:A5');
  ws.mergeCells('B2:B5');
  ws.mergeCells('C2:C5');
  ws.addImage(clienteImgId, { tl: { col: 0.12, row: 1.35 }, ext: { width: 100, height: 45 }, editAs: 'oneCell' });
  ws.getCell('B2').value = u.unidade;
  ws.getCell('C2').value = 'Legenda:';
  [ 'A2', 'B2', 'C2' ].forEach(addr => {
    const cell = ws.getCell(addr);
    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFA6A6A6' } };
    cell.font = { bold: true };
    cell.alignment = { vertical: 'middle', horizontal: 'center', wrapText: true };
  });
  const statusKeys = ['ok','ressalva','naook','naoapl'];
  statusKeys.forEach((k, i) => {
    const r = 2 + i;
    ws.getCell('D'+r).value = STATUS_INFO[k].label;
    ws.getCell('E'+r).value = STATUS_INFO[k].desc;
    ws.getCell('D'+r).font = { bold: true };
  });

  // Linha 6: cabeçalho da tabela
  const headerRow = 6;
  const headers = ['Nº Doca','Modelo','Data','Responsável','Portão','Observação(ões)','Niveladora','Observação(ões)'];
  headers.forEach((h, i) => {
    const cell = ws.getCell(headerRow, i+1);
    cell.value = h;
    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFCC0000' } };
    cell.font = { bold: true, color: { argb: 'FFFFFFFF' } };
    cell.alignment = { vertical: 'middle', horizontal: 'center' };
  });

  // Dados
  let r = headerRow + 1;
  state.forEach(d => {
    const docaDataRaw = d.data || data;
    const docaResp = d.resp || resp;
    const docaDataFmt = docaDataRaw ? docaDataRaw.split('-').reverse().join('/') : '';
    ws.getRow(r).values = [
      d.num, d.modelo, docaDataFmt, docaResp,
      SL[d.portao]||'Não preenchido', d.portaoObs||'',
      SL[d.nivel]||'Não preenchido', d.nivelObs||'',
    ];
    r++;
  });

  // RESUMO
  let ok=0,res=0,nok=0,na=0;
  const corretivas = [];
  state.forEach(d => {
    [['portao',d.portao,d.portaoObs,'Portão',d.portaoAtend,d.portaoMotivo],
     ['nivel',d.nivel,d.nivelObs,'Niveladora',d.nivelAtend,d.nivelMotivo]].forEach(([c,v,o,eq,atend,motivo])=>{
      if(v==='ok') ok++;
      else if(v==='ressalva') res++;
      else if(v==='naook') nok++;
      else if(v==='naoapl') na++;
      if(v==='ressalva'||v==='naook') corretivas.push({doca:d.num,equip:eq,obs:o||'—',atend:atend||'',motivo:motivo||''});
    });
  });

  if (obsGeral) {
    r += 1;
    ws.getCell('A'+r).value = 'OBS. GERAL DA VISITA';
    ws.getCell('A'+r).font = { bold: true };
    r++;
    ws.getCell('A'+r).value = obsGeral;
  }

  r += 1;
  ws.getCell('A'+r).value = 'RESUMO';
  ws.getCell('A'+r).font = { bold: true };
  r++;
  ws.getRow(r).values = ['Preventiva Ok', ok, 'Com Ressalvas', res, 'Não Ok', nok, 'Não se Aplica', na];
  ws.getRow(r).font = { bold: true };

  // CORRETIVAS
  r += 2;
  ws.getCell('A'+r).value = 'CORRETIVAS';
  ws.getCell('A'+r).font = { bold: true };
  r++;
  const corHeaders = ['Item','Doca','Descrição','Atendimento','Motivo'];
  corHeaders.forEach((h, i) => {
    const cell = ws.getCell(r, i+1);
    cell.value = h;
    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFCC0000' } };
    cell.font = { bold: true, color: { argb: 'FFFFFFFF' } };
  });
  r++;
  if (!corretivas.length) {
    ws.getCell('A'+r).value = 'Nenhuma corretiva registrada';
  } else {
    corretivas.forEach((c, i) => {
      const atendFmt = c.atend ? c.atend.split('-').reverse().join('/') : '';
      ws.getRow(r).values = [i+1, c.doca, c.obs, atendFmt, c.motivo];
      r++;
    });
  }

  // Auto-ajuste de largura das colunas conforme o conteúdo
  ws.columns.forEach(col => {
    let maxLen = 10;
    col.eachCell({ includeEmpty: true }, cell => {
      const len = cell.value ? String(cell.value).length : 0;
      if (len > maxLen) maxLen = len;
    });
    col.width = Math.min(maxLen + 2, 60);
  });

  const buffer = await wb.xlsx.writeBuffer();
  const blob = new Blob([buffer], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dt = data.replace(/-/g,'') || 'semdata';
  a.href = url; a.download = 'preventiva_' + currentUnitKey + '_' + dt + '.xlsx'; a.click();
  showToast('XLSX exportado!');
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/checklist-preventiva/sw.js');
}
</script>
